services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: pgsearch_test
      POSTGRES_USER: pgsearch
      POSTGRES_PASSWORD: testpassword
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pgsearch -d pgsearch_test"]
      interval: 2s
      timeout: 5s
      retries: 10
